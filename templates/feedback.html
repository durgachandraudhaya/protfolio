<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DCU | Feedback</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='self-intro-style.css') }}">
</head>
<body>

<header>
    <h1 class="logo">DCU</h1>
    <nav>
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('feedback') }}">Feedback</a>
    </nav>
</header>

<section id="feedback">
    <h2>Give Your Feedback</h2>

    <form id="feedbackForm" class="opinion-form">
        <input type="text" id="name" placeholder="Your Name" required>

        <select id="role" required>
            <option value="" disabled selected>You are...</option>
            <option value="Friend">Friend</option>
            <option value="Junior">Junior</option>
            <option value="Teacher">Teacher</option>
        </select>

        <textarea id="message" placeholder="Your feedback..." required></textarea>

        <button type="submit">Submit Feedback</button>
    </form>

    <div id="feedbackList" class="cards opinions-list"></div>
</section>

<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="{{ url_for('static', filename='feedback.js') }}"></script>
</body>
</html>
